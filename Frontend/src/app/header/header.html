<body>
<section class="header">
<header class="main-header mt-2">
  <div class="logo">
    <img src="assets/images/Logo.png" alt="Logo" routerLink="/home">
    <h1 routerLink="/home">Bogota Cultural Conectada</h1>
  </div>

  <ul class="menu" [class.active]="mobileMenuOpen">
    <li><a [routerLink]="['/home']" fragment="home" (click)="mobileMenuOpen = false">Home</a></li>
    <li><a [routerLink]="['/home']" fragment="guias" (click)="mobileMenuOpen = false">Guias</a></li>
    <li><a [routerLink]="['/home']" fragment="explorar" (click)="mobileMenuOpen = false">Explorar</a></li>
  </ul>

  <div class="header-controls">
    <div class="user-menu">
      <button class="user-btn" (click)="abrirmenu()">{{user.username}}</button>
      @if(menuopen){
        <div class="dropdown">
          <a routerLink="/dashboard-user">Mi perfil</a>
          <a (click)="cerrarsesion()">Cerrar sesión</a>
        </div>
      }
    </div>

    <div class="hamburger" (click)="toggleMobileMenu()" [class.active]="mobileMenuOpen">
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
    </div>
  </div>
</header>
</section>
</body>
