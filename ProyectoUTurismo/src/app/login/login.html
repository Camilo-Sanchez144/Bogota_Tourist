<body>
<div class="contenedor" id="titulo">
  <div class="columna">
    

  </div>

  <div class="columna2">
    <div class="container-login">
    <div class="login-content">
      <img src="assets/images/LogoBogota.png" alt="">
      <b>
        <h1>Explora los destinos más hermosos de</h1>
        <h1>Bogotá</h1>
      </b>
      <p>Conecta con viajeros, descubre experiencias únicas y crea recuerdos inolvidables en los rincones más mágicos del país.</p>
      <br>
    </div>
      <div class="botones">
        <button class="btn" id="btn-ingresar" (click)="mostrarLogin()" [class.active]="mode === 'login'">Ingresar</button>
        <button class="btn" id="btn-crearcuenta" (click)="mostrarSignup()" [class.active]="mode === 'signup'">Crear Cuenta</button>
      </div>

      <div [hidden]="mode !== 'login'" class="form-login">
        <label for="login-email">Correo</label>
        <input id="login-email" type="text" placeholder="tu@correo.com" autocomplete="off">
        <br>
        <br>
        <label for="login-pass">Contraseña</label>
        <input id="login-pass" type="password" class="mb-3" placeholder="******" autocomplete="off">
        <button class="btn btn-login w-100" (click)="login()">Ingresar</button>
      </div>

      <div [hidden]="mode !== 'signup'" class="form-signup">
        <label for="signup-name">Nombre</label>
        <input id="signup-name" type="text" placeholder="Tu nombre" autocomplete="off">
        <br>
        <br>
         <label for="signup-id">Documento</label>
        <input id="signup-id" type="text" placeholder="Tu identificación" autocomplete="off">
        <br>
        <br>
        <label for="signup-email">Correo</label>
        <input id="signup-email" type="text" placeholder="tu@correo.com" autocomplete="off">
        <br>
        <br>
        <label for="signup-pass">Contraseña</label>
        <input id="signup-pass" type="password" class="mb-3" placeholder="Crear contraseña" autocomplete="off">
        <button class="btn btn-login w-100" (click)="register()" routerLink="/home">Crear Cuenta</button>
      </div>
    </div>
  </div>
</div>
</body>
