<section class="contact-container mt-5 mb-5">
  <div class="header-section">
    <h4>CONTACTO</h4>
    <h2>Hablemos</h2>
    <p>¿Tienes alguna pregunta o sugerencia? Nos encantaría escucharte.</p>
  </div>

  <div class="form-wrapper">
    <form (ngSubmit)="submitForm()">
      <div class="form-group">
        <label for="name">Nombre Completo</label>
        <input type="text" id="name" name="name" [(ngModel)]="formData.name" required placeholder="Tu nombre">
      </div>

      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input type="email" id="email" name="email" [(ngModel)]="formData.email" required placeholder="tucorreo@ejemplo.com">
      </div>

      <div class="form-group">
        <label for="message">Mensaje</label>
        <textarea id="message" name="message" [(ngModel)]="formData.message" required rows="5" placeholder="¿En qué podemos ayudarte?"></textarea>
      </div>

      <button type="submit" class="btn-submit">Enviar Mensaje</button>
    </form>
  </div>
</section>
